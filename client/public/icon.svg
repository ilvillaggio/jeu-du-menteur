<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4">
      <stop offset="0%" stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e89c"/>
      <stop offset="50%" stop-color="#d4a43d"/>
      <stop offset="100%" stop-color="#8a6a1f"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cercle doré -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.8"/>

  <!-- Masque de carnaval (deux yeux + arcades) -->
  <path d="M 130 220 Q 256 165 382 220 Q 372 280 320 290 Q 285 295 256 270 Q 227 295 192 290 Q 140 280 130 220 Z"
        fill="url(#gold)" stroke="#3a2408" stroke-width="3"/>

  <!-- Yeux noirs -->
  <ellipse cx="200" cy="240" rx="22" ry="14" fill="#0a0a14"/>
  <ellipse cx="312" cy="240" rx="22" ry="14" fill="#0a0a14"/>

  <!-- Sourire malin sous le masque -->
  <path d="M 196 320 Q 256 350 316 320" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
</svg>
